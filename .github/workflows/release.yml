name: Release

# PyPI trusted publishing (OIDC): no stored credentials. Configure the
# "pypi" environment and the trusted publisher on pypi.org before first use.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import qnav; print(qnav.__version__)")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Package version $PKG_VERSION does not match tag $TAG" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
